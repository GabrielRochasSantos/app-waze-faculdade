spring.application.name=waze-backend
server.port=8081

# H2 Database (in-memory, auto-create)
spring.datasource.url=jdbc:h2:mem:waze
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# CORS Frontend
spring.web.cors.allowed-origins=http://localhost:8080,http://127.0.0.1:8080
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE
spring.web.cors.allowed-headers=*

# JWT Secret (mude para produção)
jwt.secret=italoNavSecretKeySuperSegura2024ChangeMe

# Redis Cache (instale Redis local: choco install redis-ports)
spring.data.redis.host=localhost
spring.data.redis.port=6379

# CORS Full (frontend static)
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# OpenAPI/Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

